name: Sync Funding

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

jobs:
  sync-funding:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync external funding data into Supabase
        run: npm run sync:funding
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BUNNYNET_API_KEY: ${{ secrets.BUNNYNET_API_KEY }}
          OPENAI_ADMIN_KEY: ${{ secrets.OPENAI_ADMIN_KEY }}
          OPENAI_COSTS_START_DATE: ${{ secrets.OPENAI_COSTS_START_DATE }}